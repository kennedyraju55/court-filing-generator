name: CI

on:
  push:
    branches: [main]
    paths:
      - "93-court-filing-generator/**"
  pull_request:
    branches: [main]
    paths:
      - "93-court-filing-generator/**"

defaults:
  run:
    working-directory: 93-court-filing-generator

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint with ruff
        run: |
          ruff check src/filing_generator/ tests/

  docker:
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t court-filing-generator .

      - name: Verify Docker image
        run: |
          docker run --rm court-filing-generator python -c "from src.filing_generator.core import FilingType; print(f'OK: {len(FilingType)} filing types')"
