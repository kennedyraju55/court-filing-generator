version: "3.8"

services:
  app:
    build: .
    container_name: court-filing-generator-web
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=gemma4:latest
      - LOG_LEVEL=INFO
    depends_on:
      - ollama
    restart: unless-stopped

  api:
    build: .
    container_name: court-filing-generator-api
    command: >
      uvicorn src.filing_generator.api:app
      --host 0.0.0.0
      --port 8000
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=gemma4:latest
      - LOG_LEVEL=INFO
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: court-filing-generator-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
